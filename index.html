<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>31-Day Prophetic Prayer Journey | Stampede International Ministries</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f7f4ee;color:#1f1a17;line-height:1.5;min-height:100vh;}
:root{--maroon:#5C1A24;--maroon-dark:#3B0F16;--gold:#C9A24B;--gold-light:#E6C97A;--ivory:#F5EFE2;}

/* Layout */
.watermark{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;overflow:hidden;}
.watermark img{width:min(900px,120%);opacity:0.05;}
.wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:1rem;}

/* Header */
.hdr{background:linear-gradient(160deg,var(--maroon) 0%,var(--maroon-dark) 100%);border-radius:16px;border:1px solid var(--gold);padding:1.5rem;margin-bottom:1.25rem;position:relative;overflow:hidden;}
.hdr-corner{position:absolute;right:-20px;top:-20px;width:150px;height:150px;opacity:0.12;}
.hdr-corner img{width:100%;}
.hdr-inner{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}
.hdr-seal{width:58px;height:58px;flex-shrink:0;}
.hdr-eyebrow{font-size:10px;letter-spacing:.12em;color:var(--gold-light);text-transform:uppercase;font-weight:600;margin-bottom:3px;}
.hdr-title{font-family:Georgia,serif;font-size:19px;font-weight:700;color:var(--ivory);margin-bottom:2px;}
.hdr-tag{font-size:12px;color:var(--gold-light);font-style:italic;}

/* Cards */
.card{background:#fff;border:1px solid var(--gold);border-radius:14px;padding:1.25rem;margin-bottom:1rem;}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:#fff;border-radius:10px;padding:.875rem;text-align:center;}
.stat.accent{border-top:2px solid var(--gold);}
.stat-n{font-size:22px;font-weight:700;color:#1f1a17;}
.stat-n.warn{color:#8a5a14;}
.stat-l{font-size:12px;color:#5a534c;margin-top:2px;}

/* Day strip */
.strip{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:1.25rem;-webkit-overflow-scrolling:touch;}
.strip::-webkit-scrollbar{height:4px;}
.strip::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
.pill{flex-shrink:0;width:38px;height:38px;border-radius:50%;border:1px solid #e3dbc9;background:#fff;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pill.sel{border:2px solid var(--gold);color:var(--maroon);}
.pill.done{background:#e7f3e3;color:#2c6e2f;border-color:transparent;}
.pill.late{background:#fbe9d2;color:#8a5a14;border-color:transparent;}

/* Day content */
.day-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.day-tag{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8a8278;}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;background:#f7f4ee;color:#5a534c;}
.badge.done{background:#e7f3e3;color:#2c6e2f;}
.badge.late{background:#fbe9d2;color:#8a5a14;}
.day-title{font-family:Georgia,serif;font-size:18px;font-weight:700;margin-bottom:8px;}
.day-info{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:#5a534c;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e3dbc944;}
.section{margin-bottom:.875rem;}
.section-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--maroon);margin-bottom:4px;}
.section-txt{font-size:14px;line-height:1.7;color:#1f1a17;}
.section-txt.italic{font-style:italic;font-family:Georgia,serif;}
.decl{background:#5C1A2408;border-left:3px solid var(--gold);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:.875rem;}
.decl .section-lbl{color:var(--maroon);}
.decl .section-txt{font-weight:600;}

/* Journal */
.journal-lbl{font-size:13px;font-weight:600;color:#5a534c;margin-bottom:6px;}
textarea{width:100%;padding:10px 12px;border:1px solid #e3dbc9;border-radius:8px;background:#fff;font-family:inherit;font-size:14px;color:#1f1a17;resize:vertical;min-height:70px;}
textarea:focus{outline:none;border-color:var(--gold);}

/* Buttons */
.btn-gold{width:100%;padding:12px;background:linear-gradient(180deg,var(--gold-light),var(--gold));color:var(--maroon-dark);font-weight:700;font-size:15px;border:1px solid var(--gold);border-radius:10px;cursor:pointer;margin-top:.75rem;}
.btn-gold:hover{filter:brightness(1.04);}
.btn-late{width:100%;padding:11px;background:#fff;color:#8a5a14;font-weight:600;font-size:14px;border:1px solid #fbe9d2;border-radius:10px;cursor:pointer;margin-top:.5rem;}
.btn-outline{background:none;border:none;color:#5a534c;font-size:13px;text-decoration:underline;cursor:pointer;padding:4px;}
.window-note{text-align:center;font-size:13px;color:#8a8278;padding:.5rem 0;}
.logged-note{text-align:center;font-size:13px;color:#5a534c;padding:.5rem 0;}

/* Login */
.login-lbl{font-size:13px;font-weight:600;color:#5a534c;display:block;margin-bottom:8px;}
input[type=text]{width:100%;padding:11px 13px;border:1px solid #e3dbc9;border-radius:8px;background:#fff;font-family:inherit;font-size:15px;color:#1f1a17;margin-bottom:12px;}
input[type=text]:focus{outline:none;border-color:var(--gold);}

/* Top row */
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.welcome-name{font-family:Georgia,serif;font-size:17px;font-weight:700;}
.welcome-sub{font-size:12px;color:#8a8278;}

/* Admin */
.roster-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:#fff;border:1px solid #e3dbc9;border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:8px;font-size:14px;}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(180deg,var(--gold-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--maroon-dark);flex-shrink:0;}
.day-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid #e3dbc9;border-radius:8px;margin-bottom:5px;font-size:13px;}
.dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;background:#f7f4ee;}
.dot.done{background:#e7f3e3;color:#2c6e2f;}
.dot.late{background:#fbe9d2;color:#8a5a14;}

/* Config warning */
.cfg{background:#fff4e5;border:1px solid var(--gold);border-radius:10px;padding:12px 14px;font-size:13px;color:#5a3e0a;margin-bottom:1.25rem;line-height:1.6;}
.cfg strong{display:block;font-size:14px;margin-bottom:2px;}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--maroon-dark);color:var(--ivory);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

@media(max-width:480px){
  .hdr-title{font-size:16px;}
  .hdr-seal{width:48px;height:48px;}
  .stats{gap:8px;}
  .stat-n{font-size:18px;}
}
</style>
</head>

const ALL_DAYS=[{"day":1,"title":"The Posture of Prayer","minutes":15,"timeOfDay":"morning","scripture":"Matthew 6:6 (KJV) - But thou, when thou prayest, enter into thy closet, and when thou hast shut thy door, pray to thy Father which is in secret; and thy Father which seeth in secret shall reward thee openly.","teaching":"Daughter of the Kingdom, before you carry your family before the throne, you must first understand the room you are walking into. Prayer is not a performance for man - it is an audience with the Most High God. Today you are not yet declaring; you are learning to enter. Find your closet - a literal place, set apart, where distraction has no permission to follow you. This is your war room and your throne room both. Before you ask God to move on behalf of your husband, your children, your health - settle first that you have been given access. You do not knock on a locked door; through Christ, the veil is torn, and you walk in as a daughter, not a beggar.","declaration":"I declare that I have access to the Father through the blood of Jesus Christ. My closet is holy ground, and what is loosed here is loosed in the heavens over my household.","type":"teaching"},{"day":2,"title":"The Authority You Carry","minutes":17,"timeOfDay":"night","scripture":"Luke 10:19 (KJV) - Behold, I give unto you power to tread on serpents and scorpions, and over all the power of the enemy: and nothing shall by any means hurt you.","teaching":"Many wives pray as though they are pleading with God to convince Him to act. That is not your assignment tonight. You are not begging - you are enforcing what has already been settled in the courts of Heaven. Jesus did not say 'I will pray you have power' - He said 'I give unto you power.' Tonight, before you cover your husband and children, settle in your spirit that you do not approach the enemy's territory as a victim. You approach as one who has been delegated authority by the Commander of Heaven's Armies. Prayer is not soft pleading - it is governed authority exercised in the name of Jesus.","declaration":"I declare I am not powerless over what threatens my household. I have been given authority to tread upon every serpent and scorpion assigned against my family. Nothing the enemy sends shall by any means harm us.","type":"teaching"},{"day":3,"title":"Praying in the Spirit - Your Prayer Language","minutes":19,"timeOfDay":"morning","scripture":"Romans 8:26 (KJV) - Likewise the Spirit also helpeth our infirmities: for we know not what to pray for as we ought: but the Spirit itself maketh intercession for us with groanings which cannot be uttered.","teaching":"There will be days, beloved, when you do not have the words. Your husband's struggle may be hidden from you. Your child's heart may be sealed shut to your understanding. Your own body may carry pain you cannot name in English. This is why the Father gave you a language that bypasses your understanding and goes straight to His throne. If you have received the prayer language of the Spirit, do not be ashamed to use it today. It is not disorder - it is divine intercession when your natural mind runs dry. If you have not yet received this gift, ask the Father for it today, and do not strive - simply yield your tongue to Him.","declaration":"I declare that when I do not know how to pray as I ought, the Spirit Himself makes intercession for me and for my household with groanings my mouth cannot fully utter. My weakness does not silence Heaven's response.","type":"teaching"},{"day":4,"title":"Repentance - The Doorway to Power","minutes":22,"timeOfDay":"night","scripture":"1 John 1:9 (KJV) - If we confess our sins, he is faithful and just to forgive us our sins, and to cleanse us from all unrighteousness.","teaching":"Hear me clearly: unconfessed sin is not the same as unworthiness. You are not earning the right to pray by being sinless. But there is a clearing that must happen before declarations carry their full weight. Tonight is not for groveling - it is for honesty. Come before the Father and let Him search you. Is there bitterness toward your husband you have not released? Resentment toward your children? Anxiety you have called 'just being a mother' that is actually unbelief? Name it. Confess it. He is faithful - not reluctant, not waiting to punish you - faithful and just to forgive and to cleanse. Repentance is not shame. It is the doorway that keeps your prayers unhindered.","declaration":"I declare that I am cleansed from all unrighteousness through the blood of Jesus Christ. My prayers are not hindered by unconfessed sin, for I have been made the righteousness of God in Christ.","type":"teaching"},{"day":5,"title":"Praise as Warfare","minutes":25,"timeOfDay":"morning","scripture":"2 Chronicles 20:22 (KJV) - And when they began to sing and to praise, the LORD set ambushments against the children of Ammon, Moab, and mount Seir, which were come against the enemy, and when they began to praise, the Lord set ambushments against the enemy and they were smitten.","teaching":"Jehoshaphat did not send the army first into battle - he sent the praisers. There is a principle here that the modern church has forgotten: praise is not the warm-up before the real prayer begins. Praise IS warfare. When you open your mouth and bless the name of the Lord over your family before you ever ask Him for anything, you are positioning ambushments against what comes against your household. Today, before declarations, before petitions - praise Him. Not because of what He has done, but because of who He is.","declaration":"I declare that as I praise the Lord over my household, He sets ambushments against every enemy assigned to my marriage, my children, and my peace. Confusion comes to the camp of the adversary when I lift my voice in praise.","type":"teaching"},{"day":6,"title":"Reverence - Approaching a Holy God","minutes":27,"timeOfDay":"night","scripture":"Hebrews 12:28-29 (KJV) - Wherefore we receiving a kingdom which cannot be moved, let us have grace, whereby we may serve God acceptably with reverence and godly fear: For our God is a consuming fire.","teaching":"Familiarity has cost many believers their fear of the Lord. Yes, He is your Abba Father - but He is also the consuming fire who sits enthroned above the cherubim. Tonight, do not rush into your requests. Sit first in awe. Remember whom you are addressing. The God who knit your husband together in his mother's womb. The God who knows the number of hairs on each of your children's heads. The God who holds your mental, emotional, and physical health in His hand. Reverence is not distance - it is honor that makes room for greater intimacy, not less.","declaration":"I declare that I approach the throne of grace with reverence and godly fear, knowing my God is a consuming fire who is both holy and near. I will not grow casual with the One who holds my household in His hands.","type":"teaching"},{"day":7,"title":"Declarations - Calling Things That Be Not As Though They Were","minutes":30,"timeOfDay":"morning","scripture":"Romans 4:17 (KJV) - ...even God, who quickeneth the dead, and calleth those things which be not as though they were.","teaching":"You have completed your foundation week. Tomorrow you step into the full 24-day journey of standing in the gap for your household across every dimension of life. Understand this final principle before you go forward: you are made in the image of a God who speaks things into existence. When you declare over your husband's purpose, your children's destiny, your family's health and peace - you are not engaging in positive thinking. You are exercising the creative authority of a covenant child of God. From this day forward, do not merely ask. Declare. Decree. Call forth.","declaration":"I declare, as a daughter of the Most High, that I call those things which be not as though they were over my husband, my children, my family, and myself. I am quickened by the same God who quickens the dead, and my words carry the weight of covenant authority.","type":"teaching"},{"day":8,"coveringArea":"Husband","minutes":32,"timeOfDay":"morning","scripture":"Ephesians 5:25 (KJV) - Husbands, love your wives, even as Christ also loved the church, and gave himself for it.","praise":"Lord, I praise You for the man you have given me. I bless Your name for the covering You have ordained him to be, for the purpose You placed in him before the foundation of the world.","reverence":"Holy God, I bow before You in reverence, acknowledging You as the One who ordained marriage from the beginning. You are holy, and I honor Your design for headship and love.","repentance":"Father, forgive me where I have dishonored, nagged, or withheld respect from my husband instead of trusting You with him. Cleanse my heart of any bitterness I have carried toward him.","declaration":"I declare my husband is blessed coming in and blessed going out. I declare he walks in clarity of purpose, strength of character, and the favor of God upon his life and leadership. No weapon formed against him shall prosper.","type":"active"},{"day":9,"coveringArea":"Children","minutes":33,"timeOfDay":"night","scripture":"Isaiah 54:13 (KJV) - And all thy children shall be taught of the LORD; and great shall be the peace of thy children.","praise":"Lord, I praise You for every child You have entrusted to my care. I bless Your name, for they are Your heritage loaned to me, not my possession but Your assignment.","reverence":"Holy God, I bow before You, acknowledging that these children belong first to You. You are the Author of life, and I honor Your sovereignty over their days.","repentance":"Father, forgive me for any moments of impatience, harsh words, or fear-driven parenting instead of faith-driven parenting. Cleanse me of anxiety I have placed on my children that belongs to You alone.","declaration":"I declare my children are taught of the Lord, and great is their peace. I declare they walk in wisdom beyond their years, protected from the snares of this age, and called according to His purpose.","type":"active"},{"day":10,"coveringArea":"Family Life","minutes":34,"timeOfDay":"morning","scripture":"Joshua 24:15 (KJV) - ...but as for me and my house, we will serve the LORD.","praise":"Lord, I praise You for the gift of family. I bless Your name for the home You are building, for the legacy that will outlive me.","reverence":"Holy God, I bow before You as the Architect of the family. You are holy, and I honor Your blueprint for this household above any worldly pattern.","repentance":"Father, forgive me for any division I have allowed, any unforgiveness I have nursed within these walls. Cleanse this home of strife and restore unity.","declaration":"I declare as for me and my house, we will serve the Lord. I declare peace governs this home, unity binds this family, and no plague comes nigh our dwelling.","type":"active"},{"day":11,"coveringArea":"Physical Health","minutes":36,"timeOfDay":"night","scripture":"3 John 1:2 (KJV) - Beloved, I wish above all things that thou mayest prosper and be in health, even as thy soul prospereth.","praise":"Lord, I praise You as Jehovah Rapha, the God who heals. I bless Your name for the bodies You knit together for Your glory.","reverence":"Holy God, I bow before You as Creator of this body. You are holy, and I honor You as the One who formed every cell with intention.","repentance":"Father, forgive me for neglecting the body You gave me, for anxious thoughts about health instead of trust in Your provision. Cleanse me of fear over my physical wellbeing.","declaration":"I declare by His stripes we are healed. I declare strength, vitality, and divine health over every body in this household, from this day forward.","type":"active"},{"day":12,"coveringArea":"Mental Health","minutes":37,"timeOfDay":"morning","scripture":"2 Timothy 1:7 (KJV) - For God hath not given us the spirit of fear; but of power, and of love, and of a sound mind.","praise" function tw(t,m){const s=t==="morning"?420:1200;return{s,e:s+m};}
function now(){const d=new Date();return d.getHours()*60+d.getMinutes();}
function ft(m){let h=Math.floor(m/60)%24,mn=m%60,ap=h>=12?"PM":"AM",h12=h%12||12;return h12+":"+(mn+"").padStart(2,"0")+" "+ap;}
function esc(s){const d=document.createElement("div");d.innerText=s||"";return d.innerHTML;}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2800);}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||"null");}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getRoster(){return lsGet("sim_roster")||[];}
function addRoster(n){const r=getRoster();if(!r.includes(n)){r.push(n);lsSet("sim_roster",r);}}
function getP(n){return lsGet("sim_p_"+n)||{};}
function setP(n,d){lsSet("sim_p_"+n,d);}
async function toSheet(payload){if(!SHEET_READY)return;try{await fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});}catch(e){}}

const S={stage:"login",name:"",day:1,p:{},adminUser:null,adminP:{},note:"",};

function hdr(){return `<div class="hdr"><div class="hdr-corner"><img src="${SEAL}" alt=""></div><div class="hdr-inner"><img class="hdr-seal" src="${SEAL}" alt="SIM"><div><p class="hdr-eyebrow">Stampede International Ministries</p><h1 class="hdr-title">The 31-Day Prophetic Prayer Journey</h1><p class="hdr-tag">Raising a Remnant and Not a Result</p></div></div></div>`;}
function cfgWarn(){return SHEET_READY?"":`<div class="cfg"><strong>⚠ Google Sheets not connected</strong>Progress saves on this device. Follow README to connect your sheet.</div>`;}

function render(){
  const app=document.getElementById("app");
  if(S.stage==="login"){
    app.innerHTML=hdr()+cfgWarn()+`<div class="card"><label class="login-lbl">Enter your name to begin or continue</label><input type="text" id="ni" placeholder="Your name" value="${esc(S.name)}"><button class="btn-gold" id="bb">Begin →</button></div><div style="text-align:center;margin-top:1rem;"><button class="btn-outline" id="ab">Apostle / Shepherding View</button></div>`;
    document.getElementById("ni").oninput=e=>S.name=e.target.value;
    document.getElementById("ni").onkeydown=e=>{if(e.key==="Enter")enterUser();};
    document.getElementById("bb").onclick=enterUser;
    document.getElementById("ab").onclick=()=>{S.stage="admin";S.adminUser=null;render();};
    return;
  }
  if(S.stage==="admin"){
    const roster=getRoster();
    app.innerHTML=hdr()+`<div class="top-row"><h2 style="font-family:Georgia,serif;font-size:18px;">Shepherding Dashboard</h2><button class="btn-outline" id="bl">← Back</button></div>`+(!S.adminUser?`<p style="font-size:13px;color:#8a8278;margin-bottom:12px;">${roster.length?'Select a participant:':'No participants yet.'}</p>`+roster.map(n=>`<button class="roster-btn" data-u="${esc(n)}"><div class="avatar">${esc(n.slice(0,2).toUpperCase())}</div>${esc(n)}</button>`).join(""):adminDetail());
    document.getElementById("bl").onclick=()=>{S.stage="login";render();};
    if(!S.adminUser)document.querySelectorAll("[data-u]").forEach(b=>b.onclick=()=>loadAdmin(b.dataset.u));
    else document.getElementById("br").onclick=()=>{S.adminUser=null;render();};
    return;
  }
  // Journey
  const day=ALL_DAYS.find(d=>d.day===S.day);
  const dp=S.p[S.day]||{};
  const{s,e}=day?tw(day.timeOfDay,day.minutes):{s:0,e:0};
  const cur=now(),inW=cur>=s&&cur<=e,passed=cur>e,future=cur<s;
  const done=ALL_DAYS.filter(d=>S.p[d.day]&&S.p[d.day].completed).length;
  const ot=ALL_DAYS.filter(d=>S.p[d.day]&&S.p[d.day].completed&&!S.p[d.day].late).length;
  const lt=ALL_DAYS.filter(d=>S.p[d.day]&&S.p[d.day].completed&&S.p[d.day].late).length;

  app.innerHTML=hdr()+cfgWarn()+
  `<div class="top-row"><div><p class="welcome-sub">Welcome back</p><p class="welcome-name">${esc(S.name)}</p></div><button class="btn-outline" id="su">Switch user</button></div>`+
  `<div class="stats"><div class="stat accent"><div class="stat-n">${done}/31</div><div class="stat-l">Completed</div></div><div class="stat"><div class="stat-n">${ot}</div><div class="stat-l">On Time</div></div><div class="stat"><div class="stat-n warn">${lt}</div><div class="stat-l">Late</div></div></div>`+
  `<div class="strip">${ALL_DAYS.map(d=>{const p=S.p[d.day],isDone=p&&p.completed,isLate=p&&p.late,isSel=d.day===S.day;return`<button class="pill${isSel?" sel":""}${isDone?(isLate?" late":" done"):""}" data-day="${d.day}">${d.day}</button>`;}).join("")}</div>`+
  `<div class="card">${day?dayCard(day,dp,s,e,inW,passed,future):""}</div>`;

  document.getElementById("su").onclick=()=>{S.stage="login";render();};
  document.querySelectorAll(".pill").forEach(b=>b.onclick=()=>{S.day=parseInt(b.dataset.day);S.note=(S.p[S.day]||{}).note||"";render();});
  const ne=document.getElementById("noteInput");
  if(ne){ne.oninput=e=>S.note=e.target.value;ne.onblur=saveNote;}
  const cb=document.getElementById("cb");if(cb)cb.onclick=()=>markDone(false);
  const lb=document.getElementById("lb");if(lb)lb.onclick=()=>markDone(true);
}

function dayCard(day,dp,s,e,inW,passed,future){
  const isDone=dp.completed,isLate=dp.late;
  return`
    <div class="day-meta">
      <span class="day-tag">Day ${day.day} — ${esc(day.type==="teaching"?"Foundation Week":day.coveringArea)}</span>
      <span class="badge${isDone?(isLate?" late":" done"):""}">${isDone?(isLate?"Logged Late":"Completed"):"Not Yet"}</span>
    </div>
    <div class="day-title">${esc(day.type==="teaching"?day.title:"Covering: "+day.coveringArea)}</div>
    <div class="day-info">
      <span>⏱ ${day.minutes} min</span>
      <span>${day.timeOfDay==="morning"?"🌅 Morning":"🌙 Night"} prayer</span>
      <span>${ft(s)} – ${ft(e)}</span>
    </div>
    <div class="section"><div class="section-lbl">Scripture</div><div class="section-txt italic">${esc(day.scripture)}</div></div>
    ${day.type==="teaching"?`<div class="section"><div class="section-lbl">Teaching</div><div class="section-txt">${esc(day.teaching)}</div></div>`:
    `<div class="section"><div class="section-lbl">Praise</div><div class="section-txt">${esc(day.praise)}</div></div>
     <div class="section"><div class="section-lbl">Reverence</div><div class="section-txt">${esc(day.reverence)}</div></div>
     <div class="section"><div class="section-lbl">Repentance</div><div class="section-txt">${esc(day.repentance)}</div></div>`}
    <div class="decl"><div class="section-lbl">Declaration</div><div class="section-txt">${esc(day.declaration)}</div></div>
    <div style="border-top:1px solid #e3dbc944;padding-top:.875rem;">
      <p class="journal-lbl">How did you feel after prayer?</p>
      <textarea id="noteInput" placeholder="Write what you sensed, what God spoke...">${esc(S.note)}</textarea>
    </div>
    ${!isDone?`
      ${future?`<p class="window-note">Prayer window opens at ${ft(s)}</p>`:""}
      ${inW?`<button class="btn-gold" id="cb">✓ Mark Prayer Complete</button>`:""}
      ${passed?`<button class="btn-late" id="lb">⏱ Window passed — log it anyway</button>`:""}
    `:`<p class="logged-note">Logged ${isLate?"late":"on time"} · ${dp.timestamp?new Date(dp.timestamp).toLocaleString():""}</p>`}`;
}

function adminDetail(){
  const p=S.adminP;
  const c=ALL_DAYS.filter(d=>p[d.day]&&p[d.day].completed).length;
  const ot=ALL_DAYS.filter(d=>p[d.day]&&p[d.day].completed&&!p[d.day].late).length;
  const lt=ALL_DAYS.filter(d=>p[d.day]&&p[d.day].completed&&p[d.day].late).length;
  return`<button class="btn-outline" id="br" style="margin-bottom:12px;">← All Participants</button>
    <p style="font-family:Georgia,serif;font-size:17px;font-weight:700;margin-bottom:1rem;">${esc(S.adminUser)}</p>
    <div class="stats" style="margin-bottom:1rem;"><div class="stat accent"><div class="stat-n">${c}/31</div><div class="stat-l">Completed</div></div><div class="stat"><div class="stat-n">${ot}</div><div class="stat-l">On Time</div></div><div class="stat"><div class="stat-n warn">${lt}</div><div class="stat-l">Late</div></div></div>`+
  ALL_DAYS.map(d=>{const dp=p[d.day]||{},isDone=dp.completed,isLate=dp.late;
    return`<div class="day-row"><div class="dot${isDone?(isLate?" late":" done"):""}">${isDone?(isLate?"⏱":"✓"):""}</div><span style="width:48px;color:#8a8278;flex-shrink:0;">Day ${d.day}</span><span style="flex:1;">${esc(d.type==="teaching"?d.title:d.coveringArea)}</span>${dp.timestamp?`<span style="font-size:11px;color:#8a8278;">${new Date(dp.timestamp).toLocaleDateString()}</span>`:""}</div>`;
  }).join("");
}

function enterUser(){
  const name=(S.name||"").trim();if(!name)return;
  addRoster(name);S.p=getP(name);
  const first=ALL_DAYS.find(d=>!S.p[d.day]||!S.p[d.day].completed);
  S.day=first?first.day:1;S.note=(S.p[S.day]||{}).note||"";
  S.stage="journey";render();
}
function loadAdmin(name){S.adminUser=name;S.adminP=getP(name);render();}

async function markDone(late){
  const day=ALL_DAYS.find(d=>d.day===S.day),ts=new Date().toISOString();
  const updated={...S.p,[S.day]:{completed:true,late:!!late,timestamp:ts,note:S.note||(S.p[S.day]||{}).note||""}};
  S.p=updated;S.note="";setP(S.name,updated);render();
  toast(late?"Logged — keep pressing in, beloved.":"Prayer complete. Well done, daughter of the King.");
  await toSheet({action:"log_prayer",name:S.name,day:S.day,coveringArea:day?(day.coveringArea||day.title):"",minutes:day?day.minutes:"",timeOfDay:day?day.timeOfDay:"",late:!!late,timestamp:ts,note:(S.p[S.day]||{}).note||""});
}
async function saveNote(){
  const updated={...S.p,[S.day]:{...(S.p[S.day]||{}),note:S.note}};
  S.p=updated;setP(S.name,updated);
  await toSheet({action:"update_note",name:S.name,day:S.day,note:S.note,timestamp:new Date().toISOString()});
}

render();
</script>
</body>
</html>
